name: Nas-tools Ocr Docker
on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  create:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v'))
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4

      -
        name: Release version
        id: release_version
        run: |
          echo "VERSION=$(echo $GITHUB_REF_NAME | sed 's/v\(.*\)/\1/')" >> $GITHUB_ENV

      -
        name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      -
        name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Prepare publish tags
        id: publish
        shell: bash
        run: |
          image="ghcr.io/${{ github.repository_owner }}/nas-tools-ocr"
          {
            echo "tags<<EOF"
            echo "$image:latest"
            if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
              echo "$image:${GITHUB_REF_NAME#v}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      -
        name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - 
        name: Build Image
        uses: docker/build-push-action@v5
        with:
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: ${{ steps.publish.outputs.tags }}
